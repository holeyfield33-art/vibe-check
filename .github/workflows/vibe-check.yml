name: vibe-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run tests
        run: python -W error::ResourceWarning test_vibe_check.py

      - name: Run vibe-check (gate on hard signals)
        run: python vibe_check.py . --out report.json --html report.html --fail-on hard

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vibe-check-report
          path: |
            report.json
            report.html
